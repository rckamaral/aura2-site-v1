kind = "web"
previewPath = "/"
title = "Aura2 - Season 1"
version = "1.0.0"
id = "artifacts/aura2-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18911

[services.development]
run = "pnpm --filter @workspace/aura2-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aura2-website", "run", "build" ]
publicDir = "artifacts/aura2-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18911"
BASE_PATH = "/"
